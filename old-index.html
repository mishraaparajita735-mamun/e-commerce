<!DOCTYPE html>
<html>
<head>
    <title>Mamun Store</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; background: #f5f5f5; }
        h1 { color: #333; }
        .product { 
            border: 1px solid #ddd; 
            padding: 15px; 
            margin: 10px; 
            display: inline-block; 
            background: white;
            border-radius: 8px;
            width: 200px;
        }
        button { 
            background: #4CAF50; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <h1>Mamun Store</h1>
    <p>Best products at best price</p>
    
    <div class="product">
        <h3>T-Shirt</h3>
        <p>Price: ₹499</p>
        <button>Add to Cart</button>
    </div>
    
    <div class="product">
        <h3>Jeans</h3>
        <p>Price: ₹999</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <h3>Shoes</h3>
        <p>Price: ₹1499</p>
        <button>Add to Cart</button>
    </div>
</body>
</html>
