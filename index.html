<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JugaadMart - Your Smart Way to Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Jugaad<span>Mart</span></div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">Categories</a></li>
            <li><a href="#">Deals</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <div class="profile"></div>
    </nav>

    <section class="hero">
        <div class="hero-left">
            <p class="tag">NEW • TRENDING DEALS</p>
            <h1>Your Smart Way to <br><span>Shop Everything</span></h1>
            <p class="desc">Discover curated products, best prices, and fast delivery — all in one place.</p>
            <div class="btns">
                <button class="btn-primary">Start Shopping</button>
                <button class="btn-secondary">View Deals</button>
            </div>
            <div class="stats">
                <div><h3>10K+</h3><p>Products</p></div>
                <div><h3>2K+</h3><p>Sellers</p></div>
                <div><h3>24/7</h3><p>Support</p></div>
            </div>
        </div>

        <div class="hero-right">
            <div class="img-box big">
                <img src="https://i.imgur.com/J5g3i3N.png" alt="Watch">
            </div>
            <div class="img-box small top">
                <img src="https://i.imgur.com/8Qp6Yb3.png" alt="Shoes">
            </div>
            <div class="img-box small bottom">
                <img src="https://i.imgur.com/k21jG3a.png" alt="Phone">
            </div>
            <div class="deal-tag">🔥 Up to 70% Off Deals</div>
        </div>
    </section>
</body>
</html>
